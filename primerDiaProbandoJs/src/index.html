<div class="caja" onclick="eventoClick(this)">Click</div>
<div class="caja" onmouseover="eventoOver(this)">Mouse over</div>
<div class="caja" onmouseout="eventoOut(this)">Mouse out</div>
<div class="caja" onmousedown="eventoDown(this)">Mouse down</div>
<div class="caja" onmouseup="eventoUp(this)">Mouse up</div>

<div class="caja">
<input type="text" oninput="eventoInput(this)">
<span>Texto:</span>
</div>

<div class="caja" ondblclick="eventoDouble(this)">Haz doble click</div>
